name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install and test
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e ".[dev]"
          python -m pytest -q
          python -c "import wrbench; from wrbench.eval.runtime import contract_path; print(contract_path())"
